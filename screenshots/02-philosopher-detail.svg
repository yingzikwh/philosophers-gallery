<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="1200" height="800" fill="#05080d" opacity="0.0"/>
  <rect width="1200" height="800" fill="#0b0f17"/>
  <!-- 背景模糊占位 -->
  <rect x="60" y="40" width="1080" height="120" rx="14" fill="#111722" opacity="0.5"/>
  <!-- 弹窗 -->
  <rect x="200" y="60" width="800" height="700" rx="18" fill="#141a24" stroke="#2a3340"/>
  <!-- 头部 -->
  <circle cx="250" cy="120" r="34" fill="#1f2a38" stroke="#f5b301"/>
  <text x="250" y="128" fill="#f5b301" font-size="26" font-weight="700" text-anchor="middle">孔</text>
  <text x="300" y="112" fill="#e6edf3" font-size="24" font-weight="800">孔子</text>
  <text x="300" y="138" fill="#8b97a7" font-size="14">Confucius · 儒家 · 公元前551–前479</text>
  <!-- 白色关闭 × -->
  <text x="960" y="92" fill="#ffffff" font-size="26" font-weight="700" text-anchor="middle">×</text>
  <line x1="220" y1="160" x2="980" y2="160" stroke="#2a3340"/>
  <!-- Tabs -->
  <text x="240" y="195" fill="#e6edf3" font-size="15" font-weight="700">简介</text>
  <text x="320" y="195" fill="#f5b301" font-size="15" font-weight="700">代表著作</text>
  <text x="420" y="195" fill="#8b97a7" font-size="15">最新消息</text>
  <text x="520" y="195" fill="#8b97a7" font-size="15">参考链接</text>
  <line x1="220" y1="210" x2="980" y2="210" stroke="#2a3340"/>
  <!-- 代表著作区 -->
  <text x="240" y="250" fill="#e6edf3" font-size="16" font-weight="700">代表著作</text>
  <g font-size="14">
    <rect x="240" y="270" width="720" height="56" rx="10" fill="#1b2330" stroke="#2a3340"/>
    <text x="262" y="304" fill="#e6edf3">论语</text>
    <rect x="800" y="284" width="120" height="28" rx="14" fill="#f5b301" opacity="0.18" stroke="#f5b301"/>
    <text x="860" y="303" fill="#f5b301" font-size="13" text-anchor="middle">读原著</text>

    <rect x="240" y="340" width="720" height="56" rx="10" fill="#1b2330" stroke="#2a3340"/>
    <text x="262" y="374" fill="#e6edf3">大学</text>
    <rect x="800" y="354" width="120" height="28" rx="14" fill="#f5b301" opacity="0.18" stroke="#f5b301"/>
    <text x="860" y="373" fill="#f5b301" font-size="13" text-anchor="middle">读原著</text>

    <rect x="240" y="410" width="720" height="56" rx="10" fill="#1b2330" stroke="#2a3340"/>
    <text x="262" y="444" fill="#e6edf3">中庸</text>
    <rect x="800" y="424" width="120" height="28" rx="14" fill="#f5b301" opacity="0.18" stroke="#f5b301"/>
    <text x="860" y="443" fill="#f5b301" font-size="13" text-anchor="middle">读原著</text>
  </g>
  <!-- 最新消息区 -->
  <text x="240" y="510" fill="#e6edf3" font-size="16" font-weight="700">最新消息</text>
  <rect x="240" y="525" width="100" height="26" rx="13" fill="#4f9cf9" opacity="0.15"/>
  <text x="290" y="543" fill="#4f9cf9" font-size="12" text-anchor="middle">来源：必应</text>
  <rect x="350" y="525" width="80" height="26" rx="13" fill="#3aa675" opacity="0.15"/>
  <text x="390" y="543" fill="#3aa675" font-size="12" text-anchor="middle">刷新</text>
  <text x="240" y="580" fill="#8b97a7" font-size="13">· 儒家文化国际论坛在京开幕，聚焦“仁”的当代价值</text>
  <text x="240" y="605" fill="#8b97a7" font-size="13">· 《论语》入选多国中学推荐阅读书目</text>
  <!-- 参考链接 -->
  <text x="240" y="650" fill="#e6edf3" font-size="16" font-weight="700">参考链接</text>
  <g font-size="12">
    <rect x="240" y="665" width="160" height="30" rx="15" fill="#4f9cf9" opacity="0.12" stroke="#4f9cf9"/>
    <text x="320" y="685" fill="#4f9cf9" text-anchor="middle">维基百科(中)</text>
    <rect x="410" y="665" width="160" height="30" rx="15" fill="#4f9cf9" opacity="0.12" stroke="#4f9cf9"/>
    <text x="490" y="685" fill="#4f9cf9" text-anchor="middle">维基百科(英)</text>
    <rect x="580" y="665" width="150" height="30" rx="15" fill="#3aa675" opacity="0.12" stroke="#3aa675"/>
    <text x="655" y="685" fill="#3aa675" text-anchor="middle">SEP哲学百科</text>
    <rect x="740" y="665" width="140" height="30" rx="15" fill="#f59e0b" opacity="0.12" stroke="#f59e0b"/>
    <text x="810" y="685" fill="#f59e0b" text-anchor="middle">百度百科</text>
  </g>
  <text x="200" y="785" fill="#5a6573" font-size="12">界面示意：思想家详情弹窗（著作可点「读原著」，链接均经校验有效）</text>
</svg>
