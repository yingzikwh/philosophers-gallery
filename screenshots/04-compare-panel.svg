<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="1200" height="800" fill="#0b0f17"/>
  <rect x="0" y="0" width="1200" height="64" fill="#111722"/>
  <text x="40" y="40" fill="#e6edf3" font-size="20" font-weight="800">思想对比</text>
  <text x="1150" y="42" fill="#ffffff" font-size="26" font-weight="700" text-anchor="middle">×</text>
  <!-- 表头 -->
  <rect x="40" y="100" width="520" height="70" rx="12" fill="#141a24" stroke="#f5b301"/>
  <circle cx="90" cy="135" r="24" fill="#1f2a38" stroke="#f5b301"/>
  <text x="90" y="142" fill="#f5b301" font-size="18" font-weight="700" text-anchor="middle">孔</text>
  <text x="130" y="142" fill="#e6edf3" font-size="20" font-weight="700">孔子</text>
  <rect x="640" y="100" width="520" height="70" rx="12" fill="#141a24" stroke="#4f9cf9"/>
  <circle cx="690" cy="135" r="24" fill="#1f2a38" stroke="#4f9cf9"/>
  <text x="690" y="142" fill="#4f9cf9" font-size="18" font-weight="700" text-anchor="middle">柏</text>
  <text x="730" y="142" fill="#e6edf3" font-size="20" font-weight="700">柏拉图</text>
  <!-- 对比行 -->
  <g font-size="15">
    <rect x="40" y="190" width="1120" height="60" rx="10" fill="#111722"/>
    <text x="60" y="226" fill="#8b97a7">时代</text>
    <text x="340" y="226" fill="#e6edf3">中国春秋（前551–前479）</text>
    <text x="940" y="226" fill="#e6edf3">古希腊（前427–前347）</text>

    <rect x="40" y="260" width="1120" height="60" rx="10" fill="#141a24"/>
    <text x="60" y="296" fill="#8b97a7">核心主张</text>
    <text x="340" y="296" fill="#e6edf3">仁、礼、中庸、修身齐家</text>
    <text x="940" y="296" fill="#e6edf3">理念论、理想国、哲人王</text>

    <rect x="40" y="330" width="1120" height="60" rx="10" fill="#111722"/>
    <text x="60" y="366" fill="#8b97a7">认识论</text>
    <text x="340" y="366" fill="#e6edf3">学而知之、温故知新</text>
    <text x="940" y="366" fill="#e6edf3">回忆说、灵魂转向</text>

    <rect x="40" y="400" width="1120" height="60" rx="10" fill="#141a24"/>
    <text x="60" y="436" fill="#8b97a7">政治观</text>
    <text x="340" y="436" fill="#e6edf3">德治、正名、大同</text>
    <text x="940" y="436" fill="#e6edf3">贤人政治、等级正义</text>

    <rect x="40" y="470" width="1120" height="60" rx="10" fill="#111722"/>
    <text x="60" y="506" fill="#8b97a7">代表著作</text>
    <text x="340" y="506" fill="#e6edf3">论语 / 大学 / 中庸</text>
    <text x="940" y="506" fill="#e6edf3">理想国 / 会饮篇</text>

    <rect x="40" y="540" width="1120" height="60" rx="10" fill="#141a24"/>
    <text x="60" y="576" fill="#8b97a7">影响</text>
    <text x="340" y="576" fill="#e6edf3">东亚儒学两千年</text>
    <text x="940" y="576" fill="#e6edf3">西方哲学源流</text>
  </g>
  <!-- 差异高亮 -->
  <rect x="40" y="620" width="1120" height="44" rx="10" fill="#f5b301" opacity="0.12"/>
  <text x="60" y="648" fill="#f5b301" font-size="14">关键差异：孔子重「人间伦理与秩序」，柏拉图重「超越的理念世界」——二者共同塑造了中西文明底色。</text>
  <text x="40" y="700" fill="#8b97a7" font-size="13">可对比任意两位思想家，维度随数据自动生成；右侧筛选与对比面板可同开自适应。</text>
  <text x="40" y="785" fill="#5a6573" font-size="12">界面示意：思想对比面板（逐维度并排比较 + 差异高亮）</text>
</svg>
